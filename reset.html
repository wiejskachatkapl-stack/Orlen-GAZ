<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset ORLEN GAZ ORLEN1062</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #071f3a, #0e5a9b);
      color: white;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .box {
      max-width: 520px;
      width: 100%;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 28px; }
    p { line-height: 1.45; font-size: 16px; }
    button {
      margin-top: 18px;
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-weight: 900;
      background: white;
      color: #0b2d52;
      font-size: 16px;
    }
    .status {
      margin-top: 16px;
      font-weight: 800;
      color: #b8ffcf;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Reset aplikacji ORLEN GAZ</h1>
    <p>Ten plik czyści stare cache, service worker i zapisaną pamięć aplikacji. Użyj go, gdy telefon ciągle otwiera starą wersję.</p>
    <button onclick="resetApp()">Wyczyść i otwórz aplikację</button>
    <div class="status" id="status">Wersja: ORLEN1062</div>
  </div>

  <script>
    async function resetApp() {
      const status = document.getElementById('status');
      status.textContent = 'Czyszczę stare dane...';

      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.unregister()));
        }
      } catch (e) {}

      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
      } catch (e) {}

      try {
        localStorage.clear();
      } catch (e) {}

      try {
        sessionStorage.clear();
      } catch (e) {}

      try {
        document.cookie.split(';').forEach(c => {
          document.cookie = c.replace(/^ +/, '').replace(/=.*/, '=;expires=' + new Date().toUTCString() + ';path=/');
        });
      } catch (e) {}

      status.textContent = 'Gotowe. Otwieram aktualną aplikację...';
      setTimeout(() => {
        location.href = './index.html?v=ORLEN1062&reset=' + Date.now();
      }, 900);
    }
  </script>
</body>
</html>
